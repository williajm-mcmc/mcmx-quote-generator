name: Build QuoteGenerator

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller PyQt6 python-docx docxtpl pillow openpyxl

      - name: Convert icon
        run: |
          python -c "
          from PIL import Image
          img = Image.open('logo.png').convert('RGBA')
          img.save('logo.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: Build
        run: python -m PyInstaller quote_generator.spec

      - name: Sign executable (Microsoft Trusted Signing)
        if: env.TRUSTED_SIGNING_ENDPOINT != ''
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id:              ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:              ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret:          ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint:                     ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name:     ${{ secrets.TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder:                 dist\QuoteGenerator
          files-folder-filter:          exe
          file-digest:                  SHA256
          timestamp-rfc3181:            http://timestamp.acs.microsoft.com
          timestamp-digest:             SHA256

      - name: Zip output
        shell: pwsh
        run: Compress-Archive -Path dist\QuoteGenerator\* -DestinationPath QuoteGenerator-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: QuoteGenerator-Windows
          path: QuoteGenerator-Windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller PyQt6 python-docx docxtpl pillow openpyxl

      - name: Convert icon to icns
        run: |
          mkdir -p MyIcon.iconset
          python -c "
          from PIL import Image
          for size in [16,32,64,128,256,512,1024]:
              img = Image.open('logo.png').convert('RGBA').resize((size,size), Image.LANCZOS)
              img.save(f'MyIcon.iconset/icon_{size}x{size}.png')
          "
          iconutil -c icns MyIcon.iconset -o logo.icns

      - name: Patch spec for macOS icon
        run: sed -i '' "s/icon='logo.ico'/icon='logo.icns'/" quote_generator.spec

      - name: Build
        run: python -m PyInstaller quote_generator.spec

      - name: Zip output
        run: cd dist && zip -r ../QuoteGenerator-Mac.zip QuoteGenerator.app

      - uses: actions/upload-artifact@v4
        with:
          name: QuoteGenerator-Mac
          path: QuoteGenerator-Mac.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## MCMX Quote Generator v2.0

            ### What's New

            **Bug Fixes**
            - Fixed XML parse crash when project/customer names contain `&`, `<`, `>`, or `"` (e.g. "AT&T")
            - Section ▲▼ arrows now correctly reorder sections visually and in the generated document
            - Insert Table dialog: spinner arrows and checkbox indicators are now visible
            - Proposal number on the document cover page now matches the saved filename (date + version)
            - Table of Contents page numbers no longer all show "1" — fixed `updateFields` injection and TOC field switches

            **Quote Generator — BOM Service Rows**
            - MCMX-SERVICES-EXPENSES service name is now **bold** in the generated Word document
            - Drive time (TRAVEL) and mileage/meals/hotel breakdown (EXPENSES) are now stripped from the generated document; a note in the tool explains they are for reference only
            - Mileage bullet now reads `• Mileage` (no count) for a cleaner document
            - Service row subtext renders at 8 pt; AFSE "Rates:" label at 9 pt bold

            **IBE & Thermal Estimators**
            - Travel In / Travel Out rows suppressed when no overnight stay is needed (local crews)

            ---

            ### Upgrading from v1.1

            **Windows:** Delete the old `QuoteGenerator` folder → extract this release's `QuoteGenerator-Windows.zip` → run `QuoteGenerator.exe`.

            **macOS:** Move `QuoteGenerator.app` from Applications to Trash → extract `QuoteGenerator-Mac.zip` → drag the new `QuoteGenerator.app` to Applications.

            Your `.mcmxq` project files are fully compatible — no migration needed.

          files: |
            QuoteGenerator-Windows/QuoteGenerator-Windows.zip
            QuoteGenerator-Mac/QuoteGenerator-Mac.zip
